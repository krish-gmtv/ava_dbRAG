<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ava DB RAG - Chat UI v1</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f7fb;
      color: #1f2937;
    }
    .container {
      max-width: 900px;
      margin: 24px auto;
      padding: 0 16px;
    }
    .panel {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 14px;
    }
    .row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }
    input[type="text"] {
      border: 1px solid #d1d5db;
      border-radius: 8px;
      padding: 8px;
      min-width: 240px;
    }
    .chat-log {
      min-height: 350px;
      max-height: 60vh;
      overflow: auto;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 12px;
      white-space: pre-wrap;
    }
    .msg {
      margin-bottom: 14px;
      padding: 10px;
      border-radius: 8px;
      line-height: 1.35;
    }
    .user { background: #e0ecff; }
    .bot { background: #eafaf0; }
    .meta {
      font-size: 12px;
      color: #6b7280;
      margin-top: 6px;
    }
    textarea {
      width: 100%;
      min-height: 80px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      padding: 10px;
      resize: vertical;
      box-sizing: border-box;
      font-family: inherit;
      margin-bottom: 10px;
    }
    button {
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 10px 14px;
      cursor: pointer;
      font-weight: 600;
    }
    button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }
    .report-panel {
      text-align: left;
      white-space: normal;
    }
    .report-panel h3 {
      margin: 0 0 6px 0;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: #374151;
    }
    .report-section {
      margin-bottom: 14px;
    }
    .report-section p {
      margin: 0;
      line-height: 1.45;
    }
    table.kpi-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }
    table.kpi-table th,
    table.kpi-table td {
      border: 1px solid #e5e7eb;
      padding: 8px 10px;
      text-align: left;
    }
    table.kpi-table th {
      background: #f3f4f6;
      font-weight: 600;
    }
    ul.report-list {
      margin: 6px 0 0 18px;
      padding: 0;
    }
    .report-next {
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px dashed #d1d5db;
      font-size: 14px;
    }
    .dev-diagnostics {
      margin-top: 12px;
      padding: 10px;
      background: #1f2937;
      color: #e5e7eb;
      border-radius: 8px;
      font-size: 12px;
      overflow: auto;
      max-height: 220px;
    }
    .dev-diagnostics h4 {
      margin: 0 0 8px 0;
      font-size: 12px;
      color: #93c5fd;
    }
    .dev-diagnostics pre {
      margin: 0;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .phrasing-fallback-note {
      margin-top: 8px;
      font-size: 12px;
      color: #92400e;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="panel">
      <h2 style="margin-top: 0;">Ava DB RAG - Chat UI v1</h2>
      <div class="row">
        <input id="threadId" type="text" placeholder="thread_id (e.g. thread-001)" />
        <input id="appUserId" type="text" placeholder="app_user_id (e.g. app-user-123)" />
      </div>
      <div class="row">
        <label><input id="useAva" type="checkbox" /> Use Ava phrasing</label>
        <label><input id="strictValidation" type="checkbox" /> Strict validation (Ava output checks)</label>
      </div>
      <div class="row">
        <label><input id="forcePrecise" type="checkbox" /> Use SQL / precise data</label>
        <label><input id="developerMode" type="checkbox" /> Developer mode (execution plan, handler, validation)</label>
      </div>
      <div class="meta">
        Ava phrasing is off by default. SQL / precise data runs direct Postgres row listings (upsheets, opportunities) when your question matches; KPI and performance summaries stay semantic. It does not change wording rules (use Strict validation for that).
      </div>
    </div>

    <div class="panel">
      <div id="chatLog" class="chat-log"></div>
      <textarea id="queryInput" placeholder="Ask a question..."></textarea>
      <div class="row">
        <button id="sendBtn">Send</button>
        <button id="clearBtn" type="button" style="background:#6b7280;">Clear chat</button>
      </div>
      <div id="statusLabel" class="meta"></div>
    </div>
  </div>

  <script>
    const chatLog = document.getElementById("chatLog");
    const queryInput = document.getElementById("queryInput");
    const sendBtn = document.getElementById("sendBtn");
    const clearBtn = document.getElementById("clearBtn");
    const statusLabel = document.getElementById("statusLabel");
    const threadIdInput = document.getElementById("threadId");
    const appUserIdInput = document.getElementById("appUserId");
    const useAvaInput = document.getElementById("useAva");
    const strictValidationInput = document.getElementById("strictValidation");
    const forcePreciseInput = document.getElementById("forcePrecise");
    const developerModeInput = document.getElementById("developerMode");

    const STORAGE_THREAD_KEY = "ava_db_rag_thread_id";
    const STORAGE_USER_KEY = "ava_db_rag_app_user_id";
    const STORAGE_FORCE_PRECISE_KEY = "ava_db_rag_force_precise";
    const STORAGE_DEVELOPER_KEY = "ava_db_rag_developer_mode";
    let isSending = false;

    function randomId(prefix) {
      return `${prefix}-${Math.random().toString(36).slice(2, 10)}`;
    }

    function initIdentityFields() {
      let storedThreadId = localStorage.getItem(STORAGE_THREAD_KEY);
      let storedAppUserId = localStorage.getItem(STORAGE_USER_KEY);

      if (!storedThreadId) {
        storedThreadId = randomId("thread");
        localStorage.setItem(STORAGE_THREAD_KEY, storedThreadId);
      }
      if (!storedAppUserId) {
        storedAppUserId = randomId("app-user");
        localStorage.setItem(STORAGE_USER_KEY, storedAppUserId);
      }

      threadIdInput.value = storedThreadId;
      appUserIdInput.value = storedAppUserId;
      const storedForce = localStorage.getItem(STORAGE_FORCE_PRECISE_KEY);
      forcePreciseInput.checked = storedForce === "1";
    }

    function persistIdentityFields() {
      const threadId = threadIdInput.value.trim();
      const appUserId = appUserIdInput.value.trim();
      if (threadId) {
        localStorage.setItem(STORAGE_THREAD_KEY, threadId);
      } else {
        localStorage.removeItem(STORAGE_THREAD_KEY);
      }
      if (appUserId) {
        localStorage.setItem(STORAGE_USER_KEY, appUserId);
      } else {
        localStorage.removeItem(STORAGE_USER_KEY);
      }
      localStorage.setItem(STORAGE_FORCE_PRECISE_KEY, forcePreciseInput.checked ? "1" : "0");
      localStorage.setItem(STORAGE_DEVELOPER_KEY, developerModeInput.checked ? "1" : "0");
    }

    function escapeHtml(s) {
      return String(s)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function formatMetricKey(key) {
      return String(key || "")
        .replace(/_/g, " ")
        .replace(/\b\w/g, (c) => c.toUpperCase());
    }

    function renderStructuredReport(sr, developerPayload, showDev) {
      if (!sr || typeof sr !== "object") {
        return "";
      }
      const kind = sr.report_kind;
      const sec = sr.sections || {};
      const parts = [];
      parts.push('<div class="report-panel">');

      if (kind === "precise") {
        if (sec.request_summary) {
          parts.push(`<div class="report-section"><h3>Request summary</h3><p>${escapeHtml(sec.request_summary)}</p></div>`);
        }
        if (Array.isArray(sec.kpi_table) && sec.kpi_table.length) {
          parts.push('<div class="report-section"><h3>Key results</h3><table class="kpi-table"><thead><tr><th>Metric</th><th>Value</th></tr></thead><tbody>');
          for (const row of sec.kpi_table) {
            parts.push(`<tr><td>${escapeHtml(formatMetricKey(row.metric_key))}</td><td>${escapeHtml(row.value)}</td></tr>`);
          }
          parts.push("</tbody></table></div>");
        }
        if (Array.isArray(sec.notes) && sec.notes.length) {
          parts.push('<div class="report-section"><h3>Notes</h3><ul class="report-list">');
          for (const n of sec.notes) {
            parts.push(`<li>${escapeHtml(n)}</li>`);
          }
          parts.push("</ul></div>");
        }
      } else if (kind === "saved_report") {
        if (sec.request_summary) {
          parts.push(`<div class="report-section"><h3>Request summary</h3><p>${escapeHtml(sec.request_summary)}</p></div>`);
        }
        if (sec.executive_summary) {
          parts.push(`<div class="report-section"><h3>Executive summary</h3><p>${escapeHtml(sec.executive_summary)}</p></div>`);
        }
        if (Array.isArray(sec.kpi_table) && sec.kpi_table.length) {
          parts.push('<div class="report-section"><h3>KPI snapshot</h3><table class="kpi-table"><thead><tr><th>Field</th><th>Value</th></tr></thead><tbody>');
          for (const row of sec.kpi_table) {
            parts.push(`<tr><td>${escapeHtml(formatMetricKey(row.metric_key))}</td><td>${escapeHtml(row.value)}</td></tr>`);
          }
          parts.push("</tbody></table></div>");
        }
        if (Array.isArray(sec.highlights) && sec.highlights.length) {
          parts.push('<div class="report-section"><h3>Highlights</h3><ul class="report-list">');
          for (const h of sec.highlights) {
            parts.push(`<li>${escapeHtml(h)}</li>`);
          }
          parts.push("</ul></div>");
        }
        if (Array.isArray(sec.notes) && sec.notes.length) {
          parts.push('<div class="report-section"><h3>Notes</h3><ul class="report-list">');
          for (const n of sec.notes) {
            parts.push(`<li>${escapeHtml(n)}</li>`);
          }
          parts.push("</ul></div>");
        }
        if (sec.template_id && showDev) {
          parts.push(`<div class="meta" style="margin-top:8px;">Template: ${escapeHtml(sec.template_id)}</div>`);
        }
      } else if (kind === "semantic") {
        if (sec.request_summary) {
          parts.push(`<div class="report-section"><h3>Request summary</h3><p>${escapeHtml(sec.request_summary)}</p></div>`);
        }
        if (sec.retrieval_status) {
          parts.push(`<div class="report-section"><h3>Retrieval status</h3><p>${escapeHtml(sec.retrieval_status)}</p></div>`);
        }
        if (sec.executive_summary) {
          parts.push(`<div class="report-section"><h3>Executive summary</h3><p>${escapeHtml(sec.executive_summary)}</p></div>`);
        }
        if (sec.trend_narrative) {
          parts.push(`<div class="report-section"><h3>Trend narrative</h3><p>${escapeHtml(sec.trend_narrative)}</p></div>`);
        }
        if (Array.isArray(sec.key_drivers) && sec.key_drivers.length) {
          parts.push('<div class="report-section"><h3>Key drivers</h3><ul class="report-list">');
          for (const d of sec.key_drivers) {
            parts.push(`<li>${escapeHtml(d)}</li>`);
          }
          parts.push("</ul></div>");
        }
        if (Array.isArray(sec.highlights) && sec.highlights.length) {
          parts.push('<div class="report-section"><h3>Highlights</h3><ul class="report-list">');
          for (const h of sec.highlights) {
            parts.push(`<li>${escapeHtml(h)}</li>`);
          }
          parts.push("</ul></div>");
        }
        if (sec.confidence_note) {
          parts.push(`<div class="report-section"><h3>Context</h3><p>${escapeHtml(sec.confidence_note)}</p></div>`);
        }
        if (Array.isArray(sec.available_evidence) && sec.available_evidence.length &&
            (!Array.isArray(sec.highlights) || !sec.highlights.length)) {
          parts.push('<div class="report-section"><h3>Available evidence</h3><ul class="report-list">');
          for (const ev of sec.available_evidence) {
            parts.push(`<li>${escapeHtml(ev)}</li>`);
          }
          parts.push("</ul></div>");
        }
      } else if (kind === "force_precise_unavailable") {
        if (sec.request_summary) {
          parts.push(`<div class="report-section"><h3>Request summary</h3><p>${escapeHtml(sec.request_summary)}</p></div>`);
        }
        if (sec.executive_summary) {
          parts.push(`<div class="report-section"><h3>Detail</h3><p>${escapeHtml(sec.executive_summary)}</p></div>`);
        }
      } else if (kind === "ui_message") {
        if (sec.message) {
          parts.push(`<div class="report-section"><p>${escapeHtml(sec.message).replace(/\n/g, "<br/>")}</p></div>`);
        }
      } else {
        if (sec.request_summary) {
          parts.push(`<div class="report-section"><p>${escapeHtml(sec.request_summary)}</p></div>`);
        }
        if (sec.executive_summary) {
          parts.push(`<div class="report-section"><p>${escapeHtml(sec.executive_summary)}</p></div>`);
        }
      }

      const nextQ =
        kind === "ui_message" ? "" : (sec.suggested_next_question || "");
      if (nextQ) {
        parts.push(`<div class="report-next"><strong>Next</strong><br/>${escapeHtml(nextQ)}</div>`);
      }

      parts.push("</div>");

      if (showDev && developerPayload && typeof developerPayload === "object") {
        parts.push('<div class="dev-diagnostics"><h4>Developer diagnostics</h4><pre>');
        parts.push(escapeHtml(JSON.stringify(developerPayload, null, 2)));
        parts.push("</pre></div>");
      }

      return parts.join("");
    }

    function appendMessage(role, text, metaText) {
      const div = document.createElement("div");
      div.className = `msg ${role}`;
      const textNode = document.createTextNode(text || "");
      div.appendChild(textNode);
      if (metaText) {
        const meta = document.createElement("div");
        meta.className = "meta";
        meta.textContent = metaText;
        div.appendChild(meta);
      }
      chatLog.appendChild(div);
      chatLog.scrollTop = chatLog.scrollHeight;
      return { div, textNode };
    }

    function appendBotReportHtml(html, metaText) {
      const div = document.createElement("div");
      div.className = "msg bot";
      const wrap = document.createElement("div");
      wrap.innerHTML = html || "";
      div.appendChild(wrap);
      if (metaText) {
        const meta = document.createElement("div");
        meta.className = "meta";
        meta.textContent = metaText;
        div.appendChild(meta);
      }
      chatLog.appendChild(div);
      chatLog.scrollTop = chatLog.scrollHeight;
      return div;
    }

    function streamIntoTextNode(textNode, fullText, delayMs = 8) {
      return new Promise((resolve) => {
        let i = 0;
        function tick() {
          i += 2;
          textNode.nodeValue = fullText.slice(0, i);
          chatLog.scrollTop = chatLog.scrollHeight;
          if (i < fullText.length) {
            setTimeout(tick, delayMs);
          } else {
            resolve();
          }
        }
        textNode.nodeValue = "";
        tick();
      });
    }

    async function sendQuery() {
      if (isSending) return;
      const query = queryInput.value.trim();
      if (!query) return;

      isSending = true;
      sendBtn.disabled = true;
      statusLabel.textContent = useAvaInput.checked ? "Calling Ava..." : "Running pipeline...";
      appendMessage("user", query);
      queryInput.value = "";
      persistIdentityFields();

      const loadingMsg = appendMessage("bot", "Working...");
      try {
        const res = await fetch("/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            query,
            thread_id: threadIdInput.value.trim(),
            app_user_id: appUserIdInput.value.trim(),
            use_ava: useAvaInput.checked,
            strict_validation: strictValidationInput.checked,
            force_precise: forcePreciseInput.checked,
            developer_mode: developerModeInput.checked
          })
        });
        const data = await res.json();

        if (!res.ok) {
          const detail = data.details ? ` | ${data.details}` : "";
          loadingMsg.textNode.nodeValue = `Error: ${data.error || "Unknown error"}${detail}`;
          return;
        }

        loadingMsg.div.remove();
        const showDev = developerModeInput.checked;
        let footerMeta = "";
        if (showDev) {
          footerMeta = [
            `source_mode=${data.source_mode}`,
            `phrasing_mode=${data.phrasing_mode}`,
            `force_precise=${data.force_precise ? "on" : "off"}`
          ].join(" | ");
        } else if (data.phrasing_mode === "deterministic_fallback") {
          footerMeta = "Ava phrasing validation or transport failed; deterministic report shown.";
        }
        const reportHtml = renderStructuredReport(
          data.structured_report,
          data.developer,
          showDev
        );
        const botDiv = appendBotReportHtml(reportHtml, footerMeta);
        if (!showDev && data.phrasing_mode === "deterministic_fallback") {
          const note = document.createElement("div");
          note.className = "phrasing-fallback-note";
          note.textContent = "The structured report reflects backend fields; Ava did not rewrite this reply.";
          botDiv.appendChild(note);
        }
      } catch (err) {
        loadingMsg.textNode.nodeValue = `Error: ${String(err)}`;
      } finally {
        isSending = false;
        sendBtn.disabled = false;
        statusLabel.textContent = "";
        queryInput.focus();
      }
    }

    clearBtn.addEventListener("click", () => {
      chatLog.innerHTML = "";
      const newThreadId = randomId("thread");
      threadIdInput.value = newThreadId;
      localStorage.setItem(STORAGE_THREAD_KEY, newThreadId);
      statusLabel.textContent = "Started a fresh conversation thread.";
    });

    threadIdInput.addEventListener("change", persistIdentityFields);
    appUserIdInput.addEventListener("change", persistIdentityFields);
    forcePreciseInput.addEventListener("change", persistIdentityFields);
    developerModeInput.addEventListener("change", persistIdentityFields);

    initIdentityFields();
    sendBtn.addEventListener("click", sendQuery);
    queryInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendQuery();
      }
    });
  </script>
</body>
</html>
