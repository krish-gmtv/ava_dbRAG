version: "3.9"

services:
  ava-pgvector:
    image: pgvector/pgvector:pg16
    container_name: ava-pgvector
    restart: unless-stopped
    environment:
      POSTGRES_DB: ava_vectors
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - ava_pgvector_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro

volumes:
  ava_pgvector_data:

